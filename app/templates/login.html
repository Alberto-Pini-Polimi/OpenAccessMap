{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="card auth-card">
    <h1>Login</h1>

    <form method="POST" class="form">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Accedi</button>
    </form>

    <p class="muted">
        Non hai un account?
        <a href="{{ url_for('signup') }}">Registrati</a>
    </p>

    <!-- percorsi utili per il debug -->
    <div class="divider"></div>
    <form action="{{ url_for('debug_route') }}" method="GET">
        <select name="path_id">

            <option value="1">
                percorso6 - mezzi + centrale - lima (veloce)
            </option>

            <option value="2">
                percorso7 - mezzi + centrale - lima (lenta)
            </option>

        </select>
        <br>
        <button type="submit" class="secondary-btn">
            Usa path di debug
        </button>
    </form>

</div>
{% endblock %}
